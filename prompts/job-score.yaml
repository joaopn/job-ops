name: job-score
description: |
  Classifies how well a candidate fits a job into one of three categories:
  very_good_fit, good_fit, or bad_fit.
  Used by services/scorer.ts when ranking discovered jobs.
variables:
  - name: briefText
    description: Free-form personal brief describing the candidate's experience.
  - name: jobTitle
  - name: employer
  - name: location
  - name: salary
  - name: degreeRequired
  - name: disciplines
  - name: jobDescription
  - name: scoringInstructionsText
    description: User-supplied additional scoring guidance.
model:
  preferStructuredOutput: true
system: ""
user: |
  Classify how well this candidate fits the job. Pick exactly one of:
    - "very_good_fit": clear, strong match. The candidate's brief shows
      direct, recent experience covering most of the job's core
      requirements; level and domain align.
    - "good_fit": reasonable match with some stretch. The brief shows
      relevant experience but is missing one or two important pieces, or
      the level/domain partially overlap.
    - "bad_fit": substantial mismatch. The brief lacks the core
      requirements, the level is wrong, or the domain is unrelated.

  Candidate brief:
  {{briefText}}

  Job:
  - Title: {{jobTitle}}
  - Employer: {{employer}}
  - Location: {{location}}
  - Salary: {{salary}}
  - Degree required: {{degreeRequired}}
  - Disciplines: {{disciplines}}

  Job description:
  {{jobDescription}}

  Additional scoring guidance: {{scoringInstructionsText}}

  Respond as JSON with
    { "category": "<very_good_fit | good_fit | bad_fit>",
      "reason": "<one to two sentence explanation>" }.
