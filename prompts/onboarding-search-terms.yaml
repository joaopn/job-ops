name: onboarding-search-terms
description: |
  Suggests 5-8 concise job-title search terms from a candidate's personal
  brief and a few flat resume hints. Used by services/onboarding-search-terms.ts
  during the onboarding wizard.
variables:
  - name: briefText
    description: Free-form personal brief describing the candidate's experience.
  - name: contextJson
    description: JSON object with headline, positions, projectNames, skillNames pulled from the active CV.
model:
  preferStructuredOutput: true
system: ""
user: |
  Suggest 5 to 8 concise job-title search terms for a job seeker based on this candidate substrate.
  Return only job-title-style phrases that work well on job boards.
  Rules:
  - Keep each term short and specific.
  - Use common title phrasing employers actually post.
  - Do not include locations, company names, salaries, Boolean operators, or explanations.
  - Do not return duplicate or near-duplicate terms.
  - Stay grounded in the candidate's actual experience — do not invent specialties.

  Personal brief:
  {{briefText}}

  Resume hints (JSON):
  {{contextJson}}
