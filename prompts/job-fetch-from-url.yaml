name: job-fetch-from-url
description: |
  Extracts structured job-posting fields from raw HTML or pasted plain-text
  job descriptions. Used by services/manualJob.ts when the user pastes a JD
  or URL contents into the manual-job dialog.
variables:
  - name: jobDescription
    description: Raw HTML or plain-text job posting.
model:
  preferStructuredOutput: true
system: ""
user: |
  You are extracting structured data from a job posting.
  The input may be raw HTML from a job listing page or plain text - extract the
  relevant job information either way.
  Return JSON only with the keys listed below. Use empty string if unknown.
  Do not guess or invent data. Ignore navigation, headers, footers, and other
  non-job content.

  CRITICAL RULES FOR `jobDescription`:
  - Copy the job posting text VERBATIM. Do NOT summarize, paraphrase, compress,
    rewrite, or otherwise edit it.
  - Include EVERY section of the posting: intro/about-the-company, role
    overview, responsibilities, requirements ("essentially..." / "must-have"),
    nice-to-haves ("it will also help..." / "bonus"), benefits, diversity
    statements, AI-usage disclosures, application instructions, and any other
    prose the page contains.
  - Preserve bullet points as a list (one per line). Preserve paragraph
    breaks. Preserve section headings ("Requirements", "Benefits", etc.).
  - Strip ONLY: HTML tags, repeated whitespace, navigation chrome, page
    headers/footers, cookie banners, login prompts, "Apply now" buttons.
  - Do not omit content because it seems redundant (some pages repeat
    "Requirements" twice — keep both occurrences).
  - The output should be a faithful plain-text rendering of the full posting,
    not a summary. Length should be comparable to the source text.

  Keys:
  - title (job title)
  - employer (company name)
  - location (job location)
  - salary (salary/compensation info)
  - deadline (application deadline)
  - jobUrl (the listing URL, if present in the content)
  - applicationLink (the apply URL, if present)
  - jobType (full-time, part-time, contract, etc.)
  - jobLevel (entry, mid, senior, etc.)
  - jobFunction (engineering, marketing, etc.)
  - disciplines (required fields/disciplines)
  - degreeRequired (required education)
  - starting (start date)
  - jobDescription (VERBATIM full text of the posting per the rules above)

  JOB POSTING CONTENT:
  {{jobDescription}}

  OUTPUT FORMAT (JSON ONLY):
  {
    "title": "",
    "employer": "",
    "location": "",
    "salary": "",
    "deadline": "",
    "jobUrl": "",
    "applicationLink": "",
    "jobType": "",
    "jobLevel": "",
    "jobFunction": "",
    "disciplines": "",
    "degreeRequired": "",
    "starting": "",
    "jobDescription": ""
  }
