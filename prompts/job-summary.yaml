name: job-summary
description: |
  Generates a tailored resume summary, headline, and skills bucket for a job
  description. Used by services/summary.ts to populate the per-job tailored
  fields.
variables:
  - name: profileJson
    description: Trimmed slice of the resume profile (basics + skills + projects + experience).
  - name: jobDescription
  - name: outputLanguage
    description: Human-readable language label (e.g. "English", "German").
  - name: tone
  - name: formality
  - name: summaryMaxWordsLine
    description: Pre-rendered "Maximum N words." string, or empty.
  - name: maxKeywordsPerSkillLine
    description: Pre-rendered keyword cap line, or empty.
  - name: constraintsBullet
    description: Pre-rendered "- Additional constraints: ..." bullet, or empty.
  - name: avoidTermsBullet
    description: Pre-rendered "- Avoid these terms: ..." bullet, or empty.
model:
  preferStructuredOutput: true
system: ""
user: |
  Adjust the candidate's resume content to better match the job below. Keep
  facts grounded in the original profile. Do not invent experience.

  Output language: {{outputLanguage}}.
  Tone: {{tone}}. Formality: {{formality}}.{{summaryMaxWordsLine}}
  {{constraintsBullet}}
  {{avoidTermsBullet}}{{maxKeywordsPerSkillLine}}

  Profile:
  {{profileJson}}

  Job:
  {{jobDescription}}

  Return JSON only, in this exact shape:
  {
    "headline": "<job-title-style headline matching the JD>",
    "summary": "<tailored resume summary paragraph>",
    "skills": [
      { "name": "<category>", "keywords": ["<skill>", "..."] }
    ]
  }
