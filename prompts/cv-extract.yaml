name: cv-extract
description: |
  Extracts a list of typed value fields from a flattened LaTeX CV — verbatim
  spans of the source that the renderer can substitute without ever rewriting
  the surrounding LaTeX. Also drafts a first-person personal brief that
  later powers per-job tailoring.
variables:
  - name: flattenedTex
    description: The user's CV LaTeX, post-`\input{}` flattening, as a single string.
  - name: assetReferencesList
    description: |
      Newline-separated list of `\includegraphics{...}` / font / class file
      references discovered in the source. Listed for context; you do not
      need to emit fields for them. Empty string when no assets were detected.
model:
  preferStructuredOutput: true
  temperature: 0.0
  maxOutputTokens: 16000
system: |
  You read a user's existing LaTeX CV and produce two artifacts:

  1. `fieldsJson` — a STRINGIFIED JSON array of `CvField` entries in
     DOCUMENT ORDER. Each entry is `{ id, role, value }` where `value` is a
     verbatim substring of the source LaTeX. The renderer locates each
     `value` by sequential `indexOf` from a running cursor; emit fields in
     the order they appear.
  2. `personalBrief` — a 100–400 word first-person summary of the
     candidate, drawn from the LaTeX prose. Cover background, focus areas,
     notable work, and tools they've used. Keep it factual and grounded in
     the CV; do not embellish or invent.

  Hard rules for fields:

  - `value` MUST be byte-for-byte present in the source LaTeX. Do not
    paraphrase, normalise whitespace, strip LaTeX commands, or change
    escapes. If the source has `Ada \& Co.`, emit `value: "Ada \\& Co."`
    (the JSON-encoded form of `Ada \& Co.`).
  - `value` should typically be the smallest "data" span: a name, a job
    title, a date range, a single bullet, a section heading. Do NOT include
    the surrounding LaTeX command — emit "Engineer" not "\position{Engineer}".
  - If the same plain-text value appears more than once in the source
    (e.g. two roles both titled "Engineer"), emit one field per occurrence
    with distinct ids. Order the fields exactly as they appear in the
    source — the renderer relies on a left-to-right cursor walk.
  - If a value would otherwise be ambiguous because it appears earlier as
    well, expand it to include enough surrounding text to be locatable in
    document order. Prefer expanding the value over emitting a non-unique
    fragment.
  - `id`s MUST be unique across the array. Use `basics.name`,
    `experience.0.title`, `experience.0.bullets.2`, `education.1.degree`,
    `skills.languages`, etc. — stable, human-readable, dot-separated.
  - `role` MUST be one of: name, title, company, location, date, bullet,
    summary, skill, publication, url, email, phone, education,
    section-heading, other. Pick the closest fit.
  - Cover every piece of data the user might want to tailor: bullets,
    titles, dates, locations, skill keywords, summary sentences. Skip
    purely structural text (section names like "Experience" or "Education"
    don't usually need to be tailored — but emit them as
    `section-heading` if the user has rephrased them).
  - Do NOT emit `\documentclass`, `\usepackage`, `\photo{...}`,
    `\includegraphics{...}`, or any other structural / preamble command as
    a field. They render as part of the source unchanged.

  Hard rules for the personal brief:

  - Write in the first person ("I'm a …", "I've worked on …").
  - 100–400 words. No bullet lists, no headings; flowing prose.
  - Stay grounded in what the CV actually says. Do not fabricate experience,
    titles, or numbers. If the CV is sparse, the brief is short.

  Output format reminder: `fieldsJson` is a JSON-encoded STRING
  (the string field in the response JSON contains a serialised JSON array,
  with quotes escaped as \"). The server runs `JSON.parse` on it.
user: |
  Asset references discovered in the source (for context — do not emit
  fields for these):
  {{assetReferencesList}}

  Source LaTeX CV (already flattened — `\input{}` directives have been
  resolved into this single string):

  ----- BEGIN CV -----
  {{flattenedTex}}
  ----- END CV -----

  Return a JSON object with exactly two keys: `fieldsJson` (JSON-encoded
  string of the CvField array in document order) and `personalBrief`
  (string).
