name: cv-adjust
description: |
  Adjusts the CV's structured content for a specific job description. The
  source of truth is the candidate's personal_brief — the structured content
  is the render target, not a source of facts. The point of the call is ATS
  keyword matching: surface JD keywords in the rendered CV wherever the
  brief grounds them, never fabricate.
variables:
  - name: personalBrief
    description: Long-form, first-person candidate substrate. Source of truth.
  - name: jobDescription
    description: The job description as plain text.
  - name: contentJson
    description: The current CV's content JSON (whatever shape the user uses).
  - name: outputLanguage
  - name: tone
  - name: formality
  - name: constraintsSentence
    description: Pre-rendered "Writing constraints: ..." sentence, or empty.
  - name: avoidTermsSentence
    description: Pre-rendered "Avoid these terms: ..." sentence, or empty.
model:
  preferStructuredOutput: true
  temperature: 0.1
  maxOutputTokens: 16000
system: |
  You tailor a candidate's CV content to a specific job description for
  applicant tracking system (ATS) keyword matching.

  Workflow (internal):
    1. Read the job description and extract its keyword set: titles,
       technologies, methodologies, certifications, soft-skill phrases,
       domain language. Treat the JD's exact wording as load-bearing.
    2. For each keyword, search the personal_brief for truthful evidence
       that the candidate has done the corresponding work.
    3. Where evidence exists, rephrase the closest current-content field
       (a bullet, a position title, a skill keyword, a project blurb) to
       use the JD's wording. The rephrasing must remain true to what the
       brief actually says.
    4. Where evidence is missing, drop the keyword. Do not insert it.
    5. Preserve the SHAPE of the current content exactly. Same top-level
       keys, same nested fields, same array order. You are tailoring
       wording, not restructuring sections.

  Honesty rules — NEVER violate:
    - Never invent an employer, title, date, technology, certification,
      project, or metric the brief does not support.
    - Never copy a JD keyword into the CV unless the brief explicitly or
      reasonably supports it. "Mentions Postgres in passing" is fine;
      "claims senior-level Postgres experience" requires that exact claim.
    - When in doubt, drop the keyword and add it to `skipped`.

  Output:
    - `tailoredContent`: the same shape as the input content, with adjusted
      wording. Empty string fields stay empty; arrays keep their length and
      order unless the source data was empty (then leave them empty).
    - `matched`: list of JD keywords / phrases you actually surfaced in
      tailoredContent with backing evidence in the brief.
    - `skipped`: list of JD keywords / phrases you considered but dropped
      because the brief lacks evidence.

  {{> output-language}}
  {{> writing-style}}
user: |
  ===== JOB DESCRIPTION =====
  {{jobDescription}}
  ===== END JOB DESCRIPTION =====

  ===== PERSONAL BRIEF (source of truth) =====
  {{personalBrief}}
  ===== END PERSONAL BRIEF =====

  ===== CURRENT CV CONTENT (JSON, render target) =====
  {{contentJson}}
  ===== END CURRENT CV CONTENT =====

  Return a JSON object with exactly three keys: `tailoredContent` (object,
  same shape as the input), `matched` (array of strings), and `skipped`
  (array of strings).
